<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Politique française</title>

  <style>
    body {
      font-family: Arial;
      background: #f1f5f9;
      margin: 0;
    }

    header {
      background: white;
      padding: 20px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    }

    .card h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .card p {
      font-size: 14px;
      color: #555;
      margin: 0 0 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 14px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
    }

    .retour {
      display: block;
      margin: 20px auto;
      width: fit-content;
    }

    #message {
      text-align: center;
      color: #888;
      padding: 30px;
    }
  </style>
</head>

<body>

<header>
  🇫🇷 Politique française
</header>

<div class="container" id="articles">
  <p id="message">⏳ Chargement des articles...</p>
</div>

<a href="index.html" class="btn retour">← Retour</a>

<script>
async function loadArticles() {

  const rssUrl = "https://www.francetvinfo.fr/politique.rss";
  const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

  const container = document.getElementById("articles");
  const message = document.getElementById("message");

  try {
    const response = await fetch(proxyUrl);

    if (!response.ok) {
      message.textContent = "❌ Impossible de charger les articles. Réessaie plus tard.";
      return;
    }

    const data = await response.json();
    const items = data.items;

    if (!items || items.length === 0) {
      message.textContent = "Aucun article trouvé.";
      return;
    }

    container.innerHTML = "";

    items.slice(0, 10).forEach(item => {
      const title = item.title || "Sans titre";
      const link = item.link || "#";
      const summary = item.description
        ? item.description.replace(/<[^>]+>/g, "").slice(0, 150) + "..."
        : "";

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${title}</h3>
        ${summary ? `<p>${summary}</p>` : ""}
        <a href="${link}" target="_blank" class="btn">Lire l'article</a>
      `;

      container.appendChild(div);
    });

  } catch (error) {
    message.textContent = "❌ Erreur de chargement. Réessaie plus tard.";
    console.error("Erreur :", error);
  }
}

loadArticles();
</script>

</body>
</html>
