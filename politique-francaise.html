<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Politique française</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      font-size: 15px;
    }

    header {
      background: white;
      padding: 14px 16px;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .barre-retour {
      padding: 10px 16px;
      background: #f1f5f9;
    }
    .btn-retour {
      display: inline-block;
      padding: 8px 16px;
      background: #64748b;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
    }

    .sources-wrapper {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .sources-wrapper::-webkit-scrollbar { display: none; }
    .sources-liste {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      width: max-content;
    }
    .source-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid #3b82f6;
      background: white;
      color: #3b82f6;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .source-btn.actif {
      background: #3b82f6;
      color: white;
    }

    .barre-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 14px;
      font-size: 12px;
      color: #94a3b8;
    }
    .refresh-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .dot {
      width: 7px; height: 7px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.3; }
    }

    .container {
      padding: 12px 14px;
      padding-bottom: 80px;
    }

    /* Section analystes */
    .section-analystes {
      margin-bottom: 18px;
    }
    .section-titre {
      font-size: 13px;
      font-weight: bold;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .analystes-liste {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .analyste-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: #1da1f2;
      color: white;
      border-radius: 20px;
      font-size: 13px;
      text-decoration: none;
      font-weight: bold;
    }

    .card {
      background: white;
      border-radius: 12px;
      margin-bottom: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .card-image {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      display: block;
    }
    .card-body { padding: 12px; }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .source-badge {
      font-size: 11px;
      font-weight: bold;
      color: #64748b;
      text-transform: uppercase;
    }
    .badge-payant {
      font-size: 11px;
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
      border-radius: 4px;
      padding: 1px 6px;
      font-weight: bold;
    }
    .card-date {
      font-size: 11px;
      color: #94a3b8;
      margin-left: auto;
    }
    .card h3 {
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 6px;
      color: #1e293b;
    }
    .card p {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .btn-lire {
      display: inline-block;
      padding: 7px 14px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
    }

    #message {
      text-align: center;
      color: #888;
      padding: 40px 20px;
    }

    #btn-top {
      position: fixed;
      bottom: 20px;
      right: 16px;
      width: 46px; height: 46px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #btn-top.visible { display: flex; }
  </style>
</head>
<body>

<header>🇫🇷 Politique française</header>

<div class="barre-retour">
  <a href="index.html" class="btn-retour">← Accueil</a>
</div>

<div class="sources-wrapper">
  <div class="sources-liste" id="sources-liste"></div>
</div>

<div class="barre-info">
  <span id="compteur"></span>
  <span class="refresh-indicator">
    <span class="dot"></span>
    <span id="refresh-texte">Actualisation auto</span>
  </span>
</div>

<div class="container">

  <!-- Section analystes politiques -->
  <div class="section-analystes" id="section-analystes" style="display:none">
    <div class="section-titre">🎙️ Analystes politiques — sur X/Twitter</div>
    <div class="analystes-liste" id="analystes-liste"></div>
  </div>

  <div id="articles">
    <p id="message">⏳ Chargement des articles...</p>
  </div>
</div>

<button id="btn-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
// ================================================================
// SOURCES RSS — toutes vérifiées
// ================================================================
const SOURCES = [
  { nom: "Radio France", groupe: "Radio France", gratuit: true,
    url: "https://www.francetvinfo.fr/politique.rss" },
  { nom: "Radio France", groupe: "Radio France", gratuit: true,
    url: "https://www.franceinter.fr/rss" },
  { nom: "BFM TV",       groupe: "BFM TV",       gratuit: true,
    url: "https://www.bfmtv.com/rss/politique/" },
  { nom: "AFP",          groupe: "AFP",           gratuit: true,
    url: "https://www.afp.com/fr/actus/afp_actualite/792,31,9,7,33/feed" },
  { nom: "France 24",    groupe: "France 24",     gratuit: true,
    url: "https://www.france24.com/fr/france/rss" },
  { nom: "RFI",          groupe: "RFI",           gratuit: true,
    url: "https://www.rfi.fr/fr/france/rss" },
  // Vie-publique remplace Public Sénat (RSS vérifié et actif)
  { nom: "Vie Publique",  groupe: "Vie Publique", gratuit: true,
    url: "https://www.vie-publique.fr/rss/actualites.xml" },
  // LCP remplace comme source parlementaire (RSS via leur flux WordPress)
  { nom: "LCP",          groupe: "LCP",           gratuit: true,
    url: "https://lcp.fr/feed" },
  { nom: "HuffPost",     groupe: "HuffPost",      gratuit: true,
    url: "https://www.huffingtonpost.fr/feeds/index.xml" },
  { nom: "Le Parisien",  groupe: "Le Parisien",   gratuit: true,
    url: "https://feeds.leparisien.fr/leparisien/rss" },
  { nom: "Ouest-France", groupe: "Ouest-France",  gratuit: true,
    url: "https://www.ouest-france.fr/rss-en-continu.xml" },
  { nom: "20 Minutes",   groupe: "20 Minutes",    gratuit: true,
    url: "https://www.20minutes.fr/feeds/rss-une.xml" },
  { nom: "La Dépêche",   groupe: "La Dépêche",    gratuit: true,
    url: "https://www.ladepeche.fr/rss.xml" },
  { nom: "Le Figaro",    groupe: "Le Figaro",     gratuit: false,
    url: "https://www.lefigaro.fr/rss/figaro_politique.xml" },
  { nom: "Libération",   groupe: "Libération",    gratuit: false,
    url: "https://www.liberation.fr/arc/outboundfeeds/rss-all/category/politique/?outputType=xml" },
];

// ================================================================
// ANALYSTES POLITIQUES — liens X/Twitter directs
// (RSS Twitter non disponible gratuitement depuis 2023)
// ================================================================
const ANALYSTES = [
  { nom: "Renaud Pila",        handle: "RenaudPila" },
  { nom: "Jérôme Sainte-Marie",handle: "JeromeSM_poly" },
  { nom: "Chloé Morin",        handle: "chloe_morin_" },
  { nom: "Frédéric Dabi",      handle: "FredericDabi" },
  { nom: "Bruno Cautrès",      handle: "BrunoCautres" },
  { nom: "Thomas Guénolé",     handle: "ThomasGuenole" },
  { nom: "Luc Rouban",         handle: "LucRouban" },
];

const PROXY = "https://api.rss2json.com/v1/api.json?count=20&rss_url=";

// Sources sans flux politique dédié → filtrage par mots-clés
const FILTRER = [
  "Le Parisien","Ouest-France","20 Minutes","HuffPost",
  "La Dépêche","France 24","RFI","Radio France","LCP","Vie Publique"
];

// ================================================================
// MOTS-CLÉS : ce qu'on VEUT (politique nationale française)
// ================================================================
const MOTS_OK = [
  // Institutions
  "gouvernement","assemblée nationale","sénat","parlement","matignon","élysée",
  "conseil des ministres","premier ministre","président de la république",
  "ministre","secrétaire d'état","conseil constitutionnel",
  // Acteurs politiques
  "macron","bayrou","barnier","weil","lecornu","retailleau","castets",
  "mélenchon","le pen","bardella","glucksmann","faure","ciotti","wauquiez",
  // Partis & coalitions
  "lfi","rn","ps","lr","renaissance","nfp","nouveau front populaire",
  "rassemblement national","la france insoumise","parti socialiste",
  "les républicains","horizons","modem",
  // Actes politiques
  "élection","vote","loi","réforme","budget","motion de censure",
  "49-3","49.3","dissolution","cohabitation","sondage","présidentielle",
  "législative","sénatoriale","programme politique","discours politique",
  "commission d'enquête","audition parlementaire",
  // Politique locale à enjeu national
  "maire de paris","marie anne",
];

// ================================================================
// MOTS-CLÉS : ce qu'on REFUSE (hors-sujet)
// ================================================================
const MOTS_NON = [
  // International pur
  "ukraine","russie","gaza","israël","iran","états-unis","trump","chine",
  "otan","ue ","union européenne","bruxelles","macron à",
  // Faits divers / société
  "accident","incendie","meurtre","crime","procès","tribunal","justice","viol",
  "fait divers","catastrophe","séisme","inondation","météo","tempête",
  // Sport & culture
  "football","ligue 1","psg","om","coupe de france","roland garros","jeux olympiques",
  "cinéma","musique","concert","série tv","film","festival",
  // Religion & fêtes
  "pâques","noël","ramadan","pape","vatican","léon xiv","église",
  // Économie sans lien politique
  "bourse","cac 40","action","immobilier","taux","inflation","prêt",
  // Divers hors-sujet
  "recette","cuisine","mode","beauté","tourisme","voyage","animaux",
  "chasse aux œufs","carnaval","saint-valentin",
];

function estPertinent(titre) {
  const t = titre.toLowerCase();
  // Refus strict si hors-sujet
  if (MOTS_NON.some(m => t.includes(m))) return false;
  // Accepté si mot politique trouvé
  return MOTS_OK.some(m => t.includes(m));
}

const MOTS_PAYANTS = ["réservé aux abonnés","abonnés","premium","accès restreint"];

function estPayant(item) {
  const t = [item.title||"", item.description||"", (item.categories||[]).join(" ")].join(" ").toLowerCase();
  return MOTS_PAYANTS.some(m => t.includes(m));
}

function extraireImage(item) {
  if (item.thumbnail?.startsWith("http")) return item.thumbnail;
  if (item.enclosure?.link && item.enclosure?.type?.startsWith("image")) return item.enclosure.link;
  for (const champ of [item.content, item.description]) {
    if (!champ) continue;
    const m1 = champ.match(/url="(https?:\/\/[^"]+\.(jpg|jpeg|png|webp)[^"]*)"/i);
    if (m1) return m1[1];
    const m2 = champ.match(/<img[^>]+src="(https?:\/\/[^"]+)"/i);
    if (m2) return m2[1];
  }
  return null;
}

function formaterDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d)) return "";
  const diff = Math.floor((Date.now() - d) / 60000);
  if (diff < 1) return "à l'instant";
  if (diff < 60) return `il y a ${diff} min`;
  if (diff < 1440) return `il y a ${Math.floor(diff/60)}h`;
  return d.toLocaleDateString("fr-FR", { day:"numeric", month:"short" });
}

let tousLesArticles = [];
let filtreActif = "Tout";
let premiereCharge = true;

async function chargerSource(source) {
  try {
    const r = await fetch(PROXY + encodeURIComponent(source.url) + "&_=" + Date.now());
    if (!r.ok) return [];
    const data = await r.json();
    if (!data.items?.length) return [];

    let items = data.items;

    // Filtrage politique pour les sources généralistes
    if (FILTRER.includes(source.nom)) {
      items = items.filter(i => estPertinent(i.title || ""));
    } else {
      // Même pour les sources dédiées politique, on retire les hors-sujet
      items = items.filter(i => {
        const t = (i.title || "").toLowerCase();
        return !MOTS_NON.some(m => t.includes(m));
      });
    }

    items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

    return items.slice(0, 10).map(i => ({
      source: source.nom,
      groupe: source.groupe,
      gratuit: source.gratuit,
      payant: !source.gratuit ? estPayant(i) : false,
      title: i.title || "Sans titre",
      link: i.link || "#",
      image: extraireImage(i),
      date: i.pubDate || "",
      summary: i.description
        ? i.description.replace(/<[^>]+>/g, "").slice(0, 160) + "..."
        : ""
    }));
  } catch(e) {
    console.warn(`Erreur ${source.nom}:`, e);
    return [];
  }
}

async function loadArticles() {
  const resultats = await Promise.all(SOURCES.map(s => chargerSource(s)));

  const vus = new Set();
  const nouveaux = resultats.flat().filter(a => {
    const key = a.title.slice(0, 60).toLowerCase();
    if (vus.has(key)) return false;
    vus.add(key);
    return true;
  });

  nouveaux.sort((a, b) => new Date(b.date) - new Date(a.date));

  if (!nouveaux.length && premiereCharge) {
    document.getElementById("message").textContent = "❌ Impossible de charger les articles.";
    return;
  }
  if (nouveaux.length > 0) tousLesArticles = nouveaux;

  if (premiereCharge) {
    creerBoutonsSources();
    afficherAnalystes();
    premiereCharge = false;
  }

  afficherArticles(filtreActif);

  const now = new Date();
  document.getElementById("refresh-texte").textContent =
    `Mis à jour à ${now.getHours()}h${String(now.getMinutes()).padStart(2,"0")}`;
}

function creerBoutonsSources() {
  const liste = document.getElementById("sources-liste");
  const groupes = ["Tout", ...new Set(tousLesArticles.map(a => a.groupe))];
  groupes.forEach(nom => {
    const btn = document.createElement("button");
    btn.className = "source-btn" + (nom === "Tout" ? " actif" : "");
    btn.textContent = nom;
    btn.onclick = () => {
      document.querySelectorAll(".source-btn").forEach(b => b.classList.remove("actif"));
      btn.classList.add("actif");
      filtreActif = nom;
      afficherArticles(nom);
    };
    liste.appendChild(btn);
  });
}

function afficherAnalystes() {
  const section = document.getElementById("section-analystes");
  const liste = document.getElementById("analystes-liste");
  section.style.display = "block";
  ANALYSTES.forEach(a => {
    const lien = document.createElement("a");
    lien.className = "analyste-btn";
    lien.href = `https://x.com/${a.handle}`;
    lien.target = "_blank";
    lien.innerHTML = `𝕏 ${a.nom}`;
    liste.appendChild(lien);
  });
}

function afficherArticles(filtre) {
  const container = document.getElementById("articles");
  const compteur = document.getElementById("compteur");

  const articles = filtre === "Tout"
    ? tousLesArticles
    : tousLesArticles.filter(a => a.groupe === filtre);

  if (!articles.length) {
    container.innerHTML = `<p id="message">Aucun article trouvé.</p>`;
    compteur.textContent = "";
    return;
  }

  compteur.textContent = `${articles.length} article${articles.length > 1 ? "s" : ""}`;
  container.innerHTML = "";

  articles.forEach(a => {
    const div = document.createElement("div");
    div.className = "card";
    const badgePayant = a.payant ? `<span class="badge-payant">🔒 Abonnés</span>` : "";
    const imageHtml = a.image
      ? `<img class="card-image" src="${a.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : "";
    const dateHtml = a.date ? `<span class="card-date">${formaterDate(a.date)}</span>` : "";
    div.innerHTML = `
      ${imageHtml}
      <div class="card-body">
        <div class="card-meta">
          <span class="source-badge">📰 ${a.source}</span>
          ${badgePayant}
          ${dateHtml}
        </div>
        <h3>${a.title}</h3>
        ${a.summary ? `<p>${a.summary}</p>` : ""}
        <a href="${a.link}" target="_blank" class="btn-lire">Lire l'article</a>
      </div>
    `;
    container.appendChild(div);
  });
}

// Rechargement toutes les 2 minutes
loadArticles();
setInterval(loadArticles, 2 * 60 * 1000);

// Bouton haut
const btnTop = document.getElementById("btn-top");
window.addEventListener("scroll", () => {
  btnTop.classList.toggle("visible", window.scrollY > 300);
});
</script>

</body>
</html>
