<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Politique française</title>

  <style>
    body {
      font-family: Arial;
      background: #f1f5f9;
      margin: 0;
    }

    header {
      background: white;
      padding: 20px;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    .filtres {
      text-align: center;
      padding: 15px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .filtre-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid #3b82f6;
      background: white;
      color: #3b82f6;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }

    .filtre-btn.actif {
      background: #3b82f6;
      color: white;
    }

    .container {
      padding: 20px;
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 15px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .source-badge {
      font-size: 11px;
      font-weight: bold;
      color: #64748b;
      text-transform: uppercase;
    }

    .badge-payant {
      font-size: 11px;
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
      border-radius: 4px;
      padding: 1px 6px;
      font-weight: bold;
    }

    .card h3 {
      margin: 0 0 8px 0;
      font-size: 15px;
      line-height: 1.4;
    }

    .card p {
      font-size: 13px;
      color: #555;
      margin: 0 0 10px 0;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 7px 14px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
    }

    .retour {
      display: block;
      margin: 20px auto;
      width: fit-content;
    }

    #message {
      text-align: center;
      color: #888;
      padding: 30px;
    }

    .compteur {
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<header>🇫🇷 Politique française</header>

<div class="filtres" id="filtres"></div>

<div class="container">
  <div class="compteur" id="compteur"></div>
  <div id="articles">
    <p id="message">⏳ Chargement des articles...</p>
  </div>
</div>

<a href="index.html" class="btn retour">← Retour</a>

<script>
const SOURCES = [
  { nom: "France Info",  gratuit: true,  url: "https://www.francetvinfo.fr/politique.rss" },
  { nom: "BFM TV",       gratuit: true,  url: "https://www.bfmtv.com/rss/politique/" },
  { nom: "AFP",          gratuit: true,  url: "https://www.afp.com/fr/actus/afp_actualite/792,31,9,7,33/feed" },
  { nom: "France Inter", gratuit: true,  url: "https://www.franceinter.fr/rss/politique.xml" },
  { nom: "France 24",    gratuit: true,  url: "https://www.france24.com/fr/france/rss" },
  { nom: "RFI",          gratuit: true,  url: "https://www.rfi.fr/fr/podcasts/politique-française/rss" },
  { nom: "Public Sénat", gratuit: true,  url: "https://www.publicsenat.fr/rss/actualites.rss" },
  { nom: "HuffPost",     gratuit: true,  url: "https://www.huffingtonpost.fr/feeds/index.xml" },
  { nom: "La Dépêche",   gratuit: true,  url: "https://www.ladepeche.fr/politique/rss.xml" },
  { nom: "Le Parisien",  gratuit: true,  url: "https://feeds.leparisien.fr/leparisien/rss" },
  { nom: "Ouest-France", gratuit: true,  url: "https://www.ouest-france.fr/rss-en-continu.xml" },
  { nom: "20 Minutes",   gratuit: true,  url: "https://www.20minutes.fr/feeds/rss-une.xml" },
  { nom: "Le Figaro",    gratuit: false, url: "https://www.lefigaro.fr/rss/figaro_politique.xml" },
  { nom: "Libération",   gratuit: false, url: "https://www.liberation.fr/arc/outboundfeeds/rss-all/category/politique/?outputType=xml" },
];

const PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";

const MOTS_CLES = [
  "gouvernement","assemblée","sénat","macron","premier ministre",
  "député","ministre","élection","parlement","politique","loi",
  "parti","présidentielle","gauche","droite","vote","réforme",
  "mélenchon","le pen","bardella","weil","barnier","bayrou",
  "lfi","rn","ps","lr","renaissance","nfp","front populaire"
];

const SOURCES_SANS_FLUX_DEDIE = ["Ouest-France", "20 Minutes", "Le Parisien", "HuffPost", "La Dépêche", "France 24"];

// Mots-clés qui signalent un article payant dans le titre ou la description
// (Le Figaro et Libération les incluent souvent dans leur flux RSS)
const MOTS_PAYANTS = [
  "réservé aux abonnés", "abonnés", "premium", "exclusif",
  "accès restreint", "payant", "subscriber"
];

function estPolitique(titre) {
  return MOTS_CLES.some(mot => titre.toLowerCase().includes(mot));
}

function estPayant(item) {
  // Vérifie dans le titre, la description et les catégories RSS
  const texte = [
    item.title || "",
    item.description || "",
    (item.categories || []).join(" ")
  ].join(" ").toLowerCase();

  return MOTS_PAYANTS.some(mot => texte.includes(mot));
}

// Extrait l'image depuis le flux RSS (plusieurs emplacements possibles)
function extraireImage(item) {
  // 1. Champ "thumbnail" (rss2json)
  if (item.thumbnail && item.thumbnail.startsWith("http")) return item.thumbnail;

  // 2. Champ "enclosure" (podcast/media RSS)
  if (item.enclosure && item.enclosure.link && item.enclosure.type &&
      item.enclosure.type.startsWith("image")) return item.enclosure.link;

  // 3. Balise <media:content> dans le contenu brut
  if (item.content) {
    const mediaMatch = item.content.match(/url="(https?:\/\/[^"]+\.(jpg|jpeg|png|webp)[^"]*)"/i);
    if (mediaMatch) return mediaMatch[1];

    // 4. Première balise <img> dans le contenu HTML
    const imgMatch = item.content.match(/<img[^>]+src="(https?:\/\/[^"]+)"/i);
    if (imgMatch) return imgMatch[1];
  }

  // 5. Première image dans la description
  if (item.description) {
    const imgMatch = item.description.match(/<img[^>]+src="(https?:\/\/[^"]+)"/i);
    if (imgMatch) return imgMatch[1];
  }

  return null;
}

let tousLesArticles = [];

async function chargerSource(source) {
  try {
    const response = await fetch(PROXY + encodeURIComponent(source.url));
    if (!response.ok) return [];
    const data = await response.json();
    if (!data.items || data.items.length === 0) return [];

    let items = data.items;

    if (SOURCES_SANS_FLUX_DEDIE.includes(source.nom)) {
      items = items.filter(item => estPolitique(item.title || ""));
    }

    return items.slice(0, 8).map(item => ({
      source: source.nom,
      gratuit: source.gratuit,
      // Pour Figaro et Libération, on détecte si l'article est payant
      payant: !source.gratuit ? estPayant(item) : false,
      title: item.title || "Sans titre",
      link: item.link || "#",
      image: extraireImage(item),
      summary: item.description
        ? item.description.replace(/<[^>]+>/g, "").slice(0, 160) + "..."
        : ""
    }));
  } catch (e) {
    console.warn(`Erreur pour ${source.nom}:`, e);
    return [];
  }
}

async function loadArticles() {
  const message = document.getElementById("message");

  const resultats = await Promise.all(SOURCES.map(s => chargerSource(s)));
  tousLesArticles = resultats.flat();

  if (tousLesArticles.length === 0) {
    message.textContent = "❌ Impossible de charger les articles. Réessaie plus tard.";
    return;
  }

  creerFiltres();
  afficherArticles("Toutes");
}

function creerFiltres() {
  const conteneurFiltres = document.getElementById("filtres");
  const sourcesPresentes = ["Toutes", ...new Set(tousLesArticles.map(a => a.source))];

  sourcesPresentes.forEach(nom => {
    const btn = document.createElement("button");
    btn.className = "filtre-btn" + (nom === "Toutes" ? " actif" : "");
    btn.textContent = nom;
    btn.onclick = () => {
      document.querySelectorAll(".filtre-btn").forEach(b => b.classList.remove("actif"));
      btn.classList.add("actif");
      afficherArticles(nom);
    };
    conteneurFiltres.appendChild(btn);
  });
}

function afficherArticles(filtre) {
  const container = document.getElementById("articles");
  const compteur = document.getElementById("compteur");

  const articles = filtre === "Toutes"
    ? tousLesArticles
    : tousLesArticles.filter(a => a.source === filtre);

  if (articles.length === 0) {
    container.innerHTML = `<p id="message">Aucun article trouvé pour cette source.</p>`;
    compteur.textContent = "";
    return;
  }

  compteur.textContent = `${articles.length} article${articles.length > 1 ? "s" : ""}`;
  container.innerHTML = "";

  articles.forEach(article => {
    const div = document.createElement("div");
    div.className = "card";

    const badgePayant = article.payant
      ? `<span class="badge-payant">🔒 Abonnés</span>`
      : "";

    const imageHtml = article.image
      ? `<img class="card-image" src="${article.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : "";

    div.innerHTML = `
      ${imageHtml}
      <div class="card-body">
        <div class="card-meta">
          <span class="source-badge">📰 ${article.source}</span>
          ${badgePayant}
        </div>
        <h3>${article.title}</h3>
        ${article.summary ? `<p>${article.summary}</p>` : ""}
        <a href="${article.link}" target="_blank" class="btn">Lire l'article</a>
      </div>
    `;

    container.appendChild(div);
  });
}

loadArticles();
</script>

</body>
</html>
