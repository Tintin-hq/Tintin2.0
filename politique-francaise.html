<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Politique française</title>

  <style>
    body {
      font-family: Arial;
      background: #f1f5f9;
      margin: 0;
    }

    header {
      background: white;
      padding: 20px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  🇫🇷 Politique française
</header>

<div class="container" id="articles">
</div>

<a href="index.html" class="btn">Retour</a>

<script>
async function loadArticles() {

  const url = "https://api.allorigins.win/raw?url=https://www.franceinfo.fr/rss";

  try {
    const response = await fetch(url);
    const text = await response.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const items = xml.querySelectorAll("item");

    const container = document.getElementById("articles");

    container.innerHTML = "";

    items.forEach((item, index) => {
      if (index > 10) return; // limite à 10 articles

      const title = item.querySelector("title").textContent;
      const link = item.querySelector("link").textContent;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${title}</h3>
        <a href="${link}" target="_blank" class="btn">Lire</a>
      `;

      container.appendChild(div);
    });

  } catch (error) {
    console.error("Erreur :", error);
  }
}

loadArticles();
</script>
